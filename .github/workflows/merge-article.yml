name: "[민] Merge Article PR"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to merge"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch
          echo "PR #${{ github.event.inputs.pr_number }} merged successfully"
